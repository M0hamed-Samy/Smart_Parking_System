<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <h1>🚗 Smart Parking System</h1>

    <div class="card">
        <h2>System Status</h2>
        <p id="system">Loading...</p>
    </div>

    <div class="card">
        <h2>Gate Status</h2>
        <p id="gate">Loading...</p>
    </div>

    <div class="card">
        <h2>Cars Detected</h2>
        <p id="cars">Loading...</p>
    </div>

    <button onclick="loadData()">Refresh</button>

<script>
function loadData(){
    fetch("/api/status")
    .then(res => res.json())
    .then(data => {
        document.getElementById("system").innerText = data.system;
        document.getElementById("gate").innerText = data.gate;
        document.getElementById("cars").innerText = data.cars_detected;
    });
}

loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
